version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cs2market_db_prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-cs2market_prod}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme123}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - cs2market_network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: cs2market_backend_prod
    restart: unless-stopped
    ports:
    - "8000:8000"
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_NAME=${DB_NAME:-cs2market_prod}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-changeme123}
      - DB_HOST=db
      - DB_PORT=5432
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
    volumes:
      - backend_static_prod:/staticfiles
      - backend_media_prod:/media
    depends_on:
      - db 
    networks:
      - cs2market_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: cs2market_frontend_prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cs2market_network

volumes:
  postgres_data_prod:
  backend_static_prod:
  backend_media_prod:

networks:
  cs2market_network:
    driver: bridge